env: vts

allocation:
  domestic: 0.60
  overseas: 0.30
  cash_buffer: 0.10

strategy_weights:
  dual_momentum: 0.30
  trend_following: 0.25
  factor_investing: 0.45

strategies:
  min_position_fraction: 0.01
  event_filter_enabled: true
  dual_momentum:
    lookback_days: 252
    top_n: 10
    rebalance_day_of_month: 1
    absolute_momentum_floor: 0.0
  trend_following:
    ema_fast_period: 20
    ema_slow_period: 60
    atr_period: 14
    rsi_period: 14
    rsi_entry_floor: 30.0
    target_volatility: 0.13
    atr_stop_multiple: 2.0
  factor_investing:
    top_n: 25
    rebalance_months: [1, 4, 7, 10]
    rebalance_day_of_month: 1
    value_weight: 0.25
    quality_weight: 0.25
    momentum_weight: 0.25
    low_vol_weight: 0.25

auto_trading:
  enabled: true
  markets: [KR]
  strategies: [dual_momentum, trend_following]
  max_orders_per_cycle: 1
  max_order_notional_per_cycle: 500000
  allow_new_entries: true
  allow_exits: true
  kr:
    schedule_cron: "*/15 9-15 * * 1-5"
    strategy_schedule_crons:
      trend_following: "*/15 9-15 * * 1-5"
      dual_momentum: "0 9 1 * *"
      factor_investing: "5 9 1 1,4,7,10 *"

database:
  path: data/quantbot.db
  busy_timeout_ms: 5000

logging:
  level: INFO
  directory: logs

monitor:
  telegram:
    enabled: true
    bot_token_env: TELEGRAM_BOT_TOKEN
    chat_id_env: TELEGRAM_CHAT_ID
    request_timeout_sec: 5

kis:
  app_key_env: KIS_APP_KEY
  app_secret_env: KIS_APP_SECRET
  account_no_env: KIS_ACCOUNT_NO
  product_code_env: KIS_PRODUCT_CODE
  token_refresh_hour_kst: 8
  rate_limit_per_sec: 20
  request_timeout_sec: 10
  environments:
    vts:
      rest_base_url: https://openapivts.koreainvestment.com:29443
      websocket_base_url: ws://ops.koreainvestment.com:31000
      token_path: /oauth2/tokenP
    prod:
      rest_base_url: https://openapi.koreainvestment.com:9443
      websocket_base_url: ws://ops.koreainvestment.com:21000
      token_path: /oauth2/tokenP

rebalancing:
  macro_threshold_pct_point: 0.05
  macro_check: monthly_eom
  broker_poll_interval_min: 10

risk:
  max_single_stock_domestic: 0.05
  max_single_stock_overseas: 0.03
  max_sector_weight: 0.25
  stop_loss_domestic: -0.07
  stop_loss_overseas: -0.05
  trailing_stop: -0.10
  daily_max_loss: -0.02
  max_drawdown_limit: -0.15
